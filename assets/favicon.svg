      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffb800" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff7b00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Golden light rays -->
  <polygon points="56,62 44,12 58,16" fill="#ffd700" opacity="0.5"/>
  <polygon points="72,62 68,6 76,8" fill="#ffd700" opacity="0.6"/>
  <polygon points="72,62 86,12 70,16" fill="#ffd700" opacity="0.5"/>

